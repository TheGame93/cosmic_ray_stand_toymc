seed: 123456

source_model:
  type: object
  center: [0.0, 0.0, 3.0]      # xc, yc, zc
  diameter: 1.0                # emitting disk diameter
  normal: [0.0, 0.0, -1.0]     # emitting side: directions satisfy `direction dot normal > 0`
  angular_model: uniform       # uniform | cosine-weighted | material-dependent (not yet implemented)
  activity_bq: 1000.0          # intrinsic source activity from the datasheet/certificate
  yield_per_decay: 1.0         # optional; defaults to 1.0
  # surface_emission_rate_hz: 500.0  # optional authoritative override of the derived front emission

monte_carlo:
  n_events: 2000000

detectors:
  - name: D1
    center: [0.0, 0.0,  0.0]
    size: [ 5.0,  10.0, 0.3]
    efficiency: 1

logic:
  conditional:
    - name: "D1"
      numerator: "D1"
      given: "D1"

output:
  detector_rate_decimals: 3
  logic_rate_decimals: 3

gui:
  # Accepted color examples:
  # - named colors such as black, lightgray, orange, lime
  # - named colors reference: Matplotlib named colors
  #   https://matplotlib.org/stable/gallery/color/named_colors.html
  # - hex strings such as "#ff8800"
  # - RGB triples such as [0.2, 0.6, 1.0]
  background_color: white
  default_detector_color: lightgray
  detector_colors:
    D1: gold
  default_track_color: black
  track_color_geometric_only: black      # given true geometrically, but false in fired mode
  track_color_fired_given_only: red       # given true in fired mode, numerator false
  track_color_fired_joint: green          # given true in fired mode, numerator true
  line_width: 4.0
  source_color: deepskyblue
  source_opacity: 0.8
