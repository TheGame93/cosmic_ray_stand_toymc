seed: 123456
theta_max_deg: 80.0

angular_model:
  type: cos2

flux_hz_per_cm2: 1

monte_carlo:
  n_events: 20000000

detectors:
  - name: T1
    center: [0.0, 0.0, 20.0]
    size: [10.0, 10.0, 1.0]
    efficiency: 0.8
  - name: T3
    center: [0.0, 0.0, 11.0]
    size: [ 6.0,  5.0, 1.0]
    efficiency: 0.8
  - name: D1
    center: [0.0, 0.0,  9.0]
    size: [ 6.0,  5.0, 0.3]
    efficiency: 1
  - name: T2
    center: [0.0, 0.0, 0.0]
    size: [10.0, 10.0, 1.0]
    efficiency: 0.8

logic:
  expressions:
    - "T1 and T2"
    - "T1 and T2 and T3"
  conditional:
    - name: "P(D1 fires | T1 and T2 and T3 fire)"
      numerator: "D1"
      given: "T1 and T2 and T3"
      mode: fired
    - name: "P(D1 fires | T1 and T2 and T3 fire)"
      numerator: "D1"
      given: "T1 and T2 and T3"
      mode: geometric

gui:
  background_color: black
