seed: 123456
theta_max_deg: 80

angular_model:
  type: cos2

flux_hz_per_cm2: 0.01

monte_carlo:
  n_events: 2000000

detectors:
  - name: T1
    center: [0.0, 0.0, 20.0]
    size: [10.0, 10.0, 1.0]
    efficiency: 0.8
  - name: T3
    center: [0.0, 0.0, 11.0]
    size: [ 6.0,  5.0, 1.0]
    efficiency: 0.8
  - name: D1
    center: [0.0, 0.0,  9.0]
    size: [ 6.0,  5.0, 0.3]
    efficiency: 1
  - name: T2
    center: [0.0, 0.0, 0.0]
    size: [10.0, 10.0, 1.0]
    efficiency: 0.8

logic:
  expressions:
    - "T1 and T2"
    - "T1 and T2 and T3"
  conditional:
    - name: "P(D1 fires | T1 and T2 fire)"
      numerator: "D1"
      given: "T1 and T2"
    - name: "P(D1 fires | T1 and T2 and T3 fire)"
      numerator: "D1"
      given: "T1 and T2 and T3"

output:
  detector_rate_decimals: 3
  logic_rate_decimals: 3

gui:
  # Accepted color examples:
  # - named colors such as black, lightgray, orange, lime
  # - hex strings such as "#ff8800"
  # - RGB triples such as [0.2, 0.6, 1.0]
  background_color: black
  default_detector_color: lightgray
  detector_colors:
    T1: steelblue
    D1: tomato
  default_track_color: white
  track_color_geometric_only: orange
  track_color_fired_given_only: gold
  track_color_fired_joint: lime
  line_width: 4.0
