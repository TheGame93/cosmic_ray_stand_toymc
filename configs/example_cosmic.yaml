seed: 123456

source_model:
  type: cosmic
  model: cos2           # only supported model today
  theta_max_deg: 70     # 0 < theta_max_deg < 90
  flux_hz_per_cm2: 0.01 # total downward flux over the simulated cone

monte_carlo:
  n_events: 2000000

detectors:
  - name: T1
    center: [0.0, 0.0, 13.0]
    size: [10.0, 10.0, 0.9]
    efficiency: 0.8
  - name: T3
    center: [0.0, 0.0, 7.0]
    size: [ 6.0,  5.0, 0.9]
    efficiency: 0.8
  - name: D1
    center: [0.0, 0.0,  6.0]
    size: [ 6.0,  5.0, 0.3]
    efficiency: 1
  - name: T2
    center: [0.0, 0.0, 0.0]
    size: [10.0, 10.0, 0.9]
    efficiency: 0.8

logic:
  expressions:
    - "T1 and T2"
    - "T1 and T2 and T3"
  conditional:
    - name: "D1|T1*T2"
      numerator: "D1"
      given: "T1 and T2"
    - name: "D1|T1*T2*T3"
      numerator: "D1"
      given: "T1 and T2 and T3"

output:
  detector_rate_decimals: 3
  logic_rate_decimals: 3

gui:
  # Accepted color examples:
  # - named colors such as black, lightgray, orange, lime
  # - named colors reference: Matplotlib named colors
  #   https://matplotlib.org/stable/gallery/color/named_colors.html
  # - hex strings such as "#ff8800"
  # - RGB triples such as [0.2, 0.6, 1.0]
  background_color: white
  default_detector_color: lightgray
  detector_colors:
    T1: black
    T3: black
    D1: gold
    T2: black
  default_track_color: black
  track_color_geometric_only: black      # given true geometrically, but false in fired mode
  track_color_fired_given_only: red       # given true in fired mode, numerator false
  track_color_fired_joint: green          # given true in fired mode, numerator true
  line_width: 4.0
