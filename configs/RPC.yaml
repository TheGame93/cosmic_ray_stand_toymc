seed: 123456
theta_max_deg: 70

angular_model:
  type: cos2

flux_hz_per_cm2: 0.01

monte_carlo:
  n_events: 2000000

detectors:
  - name: T1
    center: [0.0, 0.0, 7.0]
    size: [10.0, 10.0, 1.0]
    efficiency: 0.8
  - name: RPC1
    center: [0.0, 0.0,  4.0]
    size: [ 20.0, 20.0, 0.1]
    efficiency: 0.7
  - name: RPC2
    center: [0.0, 0.0,  3.0]
    size: [ 20.0, 20.0, 0.1]
    efficiency: 0.7
  - name: T2
    center: [0.0, 0.0, 0.0]
    size: [10.0, 10.0, 1.0]
    efficiency: 0.8

logic:
  expressions:
    - "T1 and T2"
    - "RPC1 or RPC2"
    - "RPC1 and RPC2"
  conditional:
    - name: "single gap efficiency"
      numerator: "RPC1"
      given: "T1 and T2"
    - name: "bigap-RPC efficiency"
      numerator: "RPC1 or RPC2"
      given: "T1 and T2"

output:
  detector_rate_decimals: 3
  logic_rate_decimals: 3

gui:
  # Accepted color examples:
  # - named colors such as black, lightgray, orange, lime
  # - named colors reference: Matplotlib named colors
  #   https://matplotlib.org/stable/gallery/color/named_colors.html
  # - hex strings such as "#ff8800"
  # - RGB triples such as [0.2, 0.6, 1.0]
  background_color: white
  default_detector_color: lightgray
  detector_colors:
    T1: black
    RPC1: gray
    RPC2: gray
    T2: black
  default_track_color: black
  track_color_geometric_only: black      # given true geometrically, but false in fired mode
  track_color_fired_given_only: red       # given true in fired mode, numerator false
  track_color_fired_joint: green          # given true in fired mode, numerator true
  line_width: 4.0
